---
# Windows 10 Virtual Machine Template
#
# This template creates a Windows 10 VM optimized for OADP (OpenShift API for Data Protection)
# migration testing. VMs created from this template will automatically clone the base Windows
# image from the DataSource.
#
# VM Specifications:
# - 4 vCPUs
# - 8Gi RAM
# - 70Gi disk (cloned from windows DataSource)
# - VirtIO drivers for optimal performance
#
# Creating a VM from this template:
#   oc process windows10-template -p VM_NAME=windows-vm1 | oc apply -f -
#
# Template Parameters:
# - VM_NAME: Name for the VM instance (default: windows10-vm)
# - VM_NAMESPACE: Namespace to create the VM in (default: default)
#
apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: windows10-template
  namespace: openshift-virtualization-os-images
  annotations:
    openshift.io/display-name: "Windows 10 VM (OADP)"
    description: >-
      Template for creating Windows 10 VMs for OADP migration testing.
      The VM uses a pre-configured Windows 10 image with OADP test applications.
    tags: "virtualization,windows,oadp"
    iconClass: "icon-windows"
    openshift.io/provider-display-name: "Red Hat, Inc."
    openshift.io/documentation-url: "https://github.com/tsanders-rh/ocpctl"
    openshift.io/support-url: "https://github.com/tsanders-rh/ocpctl/issues"
objects:
  - apiVersion: kubevirt.io/v1
    kind: VirtualMachine
    metadata:
      name: ${VM_NAME}
      namespace: ${VM_NAMESPACE}
      labels:
        app: ${VM_NAME}
        vm.kubevirt.io/template: windows10-template
        vm.kubevirt.io/os: windows10
        workload.template.kubevirt.io/server: "true"
    spec:
      running: false
      dataVolumeTemplates:
        - metadata:
            name: ${VM_NAME}-disk
          spec:
            storage:
              resources:
                requests:
                  storage: 70Gi
              storageClassName: ocs-storagecluster-ceph-rbd-virtualization
            source:
              pvc:
                # Clone from the windows DataSource in openshift-virtualization-os-images
                name: windows
                namespace: openshift-virtualization-os-images
      template:
        metadata:
          labels:
            kubevirt.io/vm: ${VM_NAME}
            vm.kubevirt.io/name: ${VM_NAME}
        spec:
          domain:
            cpu:
              cores: 4
              sockets: 1
              threads: 1
            devices:
              disks:
                - name: rootdisk
                  disk:
                    bus: virtio
                - name: cloudinitdisk
                  disk:
                    bus: virtio
              interfaces:
                - name: default
                  masquerade: {}
                  model: virtio
              networkInterfaceMultiqueue: true
              rng: {}
            features:
              acpi: {}
              apic: {}
              hyperv:
                frequencies: {}
                ipi: {}
                reenlightenment: {}
                relaxed: {}
                reset: {}
                runtime: {}
                spinlocks:
                  spinlocks: 8191
                synic: {}
                synictimer:
                  direct: {}
                tlbflush: {}
                vapic: {}
                vpindex: {}
            firmware:
              bootloader:
                efi:
                  secureBoot: false
            machine:
              type: pc-q35-rhel9.2.0
            resources:
              requests:
                memory: 8Gi
          evictionStrategy: LiveMigrate
          networks:
            - name: default
              pod: {}
          volumes:
            - name: rootdisk
              dataVolume:
                name: ${VM_NAME}-disk
            - name: cloudinitdisk
              cloudInitNoCloud:
                userDataSecretRef:
                  name: ${VM_NAME}-cloudinit
  - apiVersion: v1
    kind: Secret
    metadata:
      name: ${VM_NAME}-cloudinit
      namespace: ${VM_NAMESPACE}
    type: Opaque
    stringData:
      userdata: |
        #cloud-config
        # Windows cloud-init configuration
        # This is processed by cloudbase-init on first boot
        #
        # Note: The Windows image must have cloudbase-init installed
        # for this configuration to take effect
        hostname: ${VM_NAME}

parameters:
  - name: VM_NAME
    description: "Name of the Virtual Machine"
    value: "windows10-vm"
    required: true
  - name: VM_NAMESPACE
    description: "Namespace to create the VM in"
    value: "default"
    required: true
