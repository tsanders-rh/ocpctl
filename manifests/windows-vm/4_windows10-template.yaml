---
# Windows 10 Virtual Machine Template
#
# This template creates a Windows 10 VM optimized for OADP (OpenShift API for Data Protection)
# migration testing. VMs created from this template will automatically clone the base Windows
# image from the DataSource.
#
# VM Specifications:
# - 4 vCPUs
# - 8Gi RAM
# - 70Gi disk (cloned from windows10-datasource)
# - VirtIO drivers for optimal performance
#
# Creating a VM from this template:
#   oc process windows10-oadp-vm -p VM_NAME=windows-vm1 -p VM_NAMESPACE=default | oc apply -f -
#
# Template Parameters:
# - VM_NAME: Name for the VM instance (auto-generated if not specified)
# - VM_NAMESPACE: Namespace to create the VM in (default: default)
#
apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: windows10-oadp-vm
  namespace: openshift
  labels:
    template.kubevirt.io/type: base
    template.kubevirt.io/default-os-variant: "true"
    os.template.kubevirt.io/win10: "true"
    workload.template.kubevirt.io/desktop: "true"
    flavor.template.kubevirt.io/medium: "true"
    template.kubevirt.io/architecture: amd64
    template.kubevirt.io/version: v0.27.0
    app.kubernetes.io/component: templating
    app.kubernetes.io/managed-by: ocpctl
    app.kubernetes.io/name: windows10-oadp-template
  annotations:
    openshift.io/display-name: "Windows 10 VM (OADP)"
    openshift.io/documentation-url: "https://github.com/tsanders-rh/ocpctl"
    description: >-
      Template for creating Windows 10 VMs for OADP migration testing.
      The VM uses a pre-configured Windows 10 image optimized for backup and restore operations.
    tags: "kubevirt,virtualmachine,windows,oadp"
    iconClass: "icon-windows"
    template.openshift.io/bindable: "false"
    template.kubevirt.io/editable: |
      /objects[0].spec.template.spec.domain.cpu.cores
      /objects[0].spec.template.spec.domain.memory.guest
      /objects[0].spec.template.spec.domain.devices.disks
      /objects[0].spec.template.spec.volumes
      /objects[0].spec.template.spec.networks
    defaults.template.kubevirt.io/disk: rootdisk
    defaults.template.kubevirt.io/network: default
    validations: |
      [
        {
          "name": "minimal-required-memory",
          "path": "jsonpath::.spec.domain.memory.guest",
          "rule": "integer",
          "message": "This VM requires more memory.",
          "min": 2147483648
        }
      ]
    name.os.template.kubevirt.io/win10: Microsoft Windows 10
    openshift.io/provider-display-name: "ocpctl"
    openshift.kubevirt.io/pronounceable-suffix-for-name-expression: "true"
    template.kubevirt.io/provider: "ocpctl"
    template.kubevirt.io/provider-support-level: "Community"
    template.kubevirt.io/provider-url: "https://github.com/tsanders-rh/ocpctl"
objects:
  - apiVersion: kubevirt.io/v1
    kind: VirtualMachine
    metadata:
      name: ${VM_NAME}
      namespace: ${VM_NAMESPACE}
      labels:
        app: ${VM_NAME}
        vm.kubevirt.io/template: windows10-oadp-vm
        vm.kubevirt.io/template.namespace: openshift
        vm.kubevirt.io/template.revision: "1"
        vm.kubevirt.io/template.version: v0.27.0
        vm.kubevirt.io/os: windows10
    spec:
      running: false
      dataVolumeTemplates:
        - metadata:
            name: ${VM_NAME}-disk
          spec:
            sourceRef:
              kind: DataSource
              name: windows10-datasource
              namespace: openshift-virtualization-os-images
            storage:
              resources:
                requests:
                  storage: 70Gi
              storageClassName: ocs-storagecluster-ceph-rbd-virtualization
      template:
        metadata:
          annotations:
            vm.kubevirt.io/flavor: medium
            vm.kubevirt.io/os: windows10
            vm.kubevirt.io/workload: desktop
          labels:
            kubevirt.io/vm: ${VM_NAME}
            vm.kubevirt.io/name: ${VM_NAME}
        spec:
          domain:
            cpu:
              cores: 4
              sockets: 1
              threads: 1
            devices:
              disks:
                - name: rootdisk
                  disk:
                    bus: virtio
                - name: cloudinitdisk
                  disk:
                    bus: virtio
              interfaces:
                - name: default
                  masquerade: {}
                  model: virtio
              networkInterfaceMultiqueue: true
              rng: {}
            features:
              acpi: {}
              apic: {}
              hyperv:
                frequencies: {}
                ipi: {}
                reenlightenment: {}
                relaxed: {}
                reset: {}
                runtime: {}
                spinlocks:
                  spinlocks: 8191
                synic: {}
                synictimer:
                  direct: {}
                tlbflush: {}
                vapic: {}
                vpindex: {}
            firmware:
              bootloader:
                efi:
                  secureBoot: false
            machine:
              type: pc-q35-rhel9.2.0
            resources:
              requests:
                memory: 8Gi
          evictionStrategy: LiveMigrate
          networks:
            - name: default
              pod: {}
          volumes:
            - name: rootdisk
              dataVolume:
                name: ${VM_NAME}-disk
            - name: cloudinitdisk
              cloudInitNoCloud:
                userDataSecretRef:
                  name: ${VM_NAME}-cloudinit
  - apiVersion: v1
    kind: Secret
    metadata:
      name: ${VM_NAME}-cloudinit
      namespace: ${VM_NAMESPACE}
    type: Opaque
    stringData:
      userdata: |
        #cloud-config
        # Windows cloud-init configuration
        # This is processed by cloudbase-init on first boot
        #
        # Note: The Windows image must have cloudbase-init installed
        # for this configuration to take effect
        hostname: ${VM_NAME}

parameters:
  - name: VM_NAME
    description: "Name of the Virtual Machine"
    generate: expression
    from: "windows-[a-z0-9]{6}"
    required: true
  - name: VM_NAMESPACE
    description: "Namespace to create the VM in"
    value: "default"
    required: true
