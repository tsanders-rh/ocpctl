# API subdomain configuration for ocpctl
# This provides a dedicated domain for direct API access

# HTTP (redirect to HTTPS)
server {
    listen 80;
    server_name api.ocpctl.mg.dog8code.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS API server
server {
    listen 443 ssl http2;
    server_name api.ocpctl.mg.dog8code.com;

    # SSL certificates (use Let's Encrypt or your own certs)
    # These should include api.ocpctl.mg.dog8code.com as a SAN
    ssl_certificate /etc/ssl/certs/ocpctl.crt;
    ssl_certificate_key /etc/ssl/private/ocpctl.key;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CORS headers for API access
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials true always;
    add_header Access-Control-Max-Age 3600 always;

    # Handle preflight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Swagger API documentation
    location /swagger/ {
        proxy_pass http://localhost:8080/swagger/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://localhost:8080/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # API endpoints (all traffic goes to API server)
    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Increase timeout for long-running operations (cluster creation)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # WebSocket support (for potential streaming endpoints)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # Rate limiting (optional, adjust as needed)
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    # limit_req zone=api_limit burst=200 nodelay;
}
