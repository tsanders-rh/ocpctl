name: aws-virt-windows-minimal
displayName: AWS OpenShift Virtualization (HA Windows Testing)
description: High-availability OpenShift Virtualization setup for Windows VM testing with dual metal workers and automated S3-backed Windows image deployment. Supports 25-30 concurrent Windows VMs. IMPORTANT - Metal instances are expensive, use work hours hibernation to save ~$4,868/month.
platform: aws
enabled: true

openshiftVersions:
  allowlist:
    - "4.18.35"
    - "4.19.23"
    - "4.20.3"
    - "4.20.4"
    - "4.20.5"
    - "4.21.8"
    - "4.21.9"
    - "4.21.10"
    - "4.22.0-ec.5"   # Dev-preview (Early Candidate 5, RHEL9 FIPS)
  default: "4.20.3"

regions:
  allowlist:
    - us-east-1
    - us-east-2
    - us-west-1
    - us-west-2
    - eu-west-1
    - eu-west-2
    - eu-central-1
    - ap-southeast-1
    - ap-southeast-2
    - ap-northeast-1
  default: us-east-1

baseDomains:
  allowlist:
    - mg.dog8code.com
  default: mg.dog8code.com

compute:
  controlPlane:
    replicas: 3
    instanceType: m6i.xlarge
    schedulable: false
  workers:
    replicas: 2
    minReplicas: 2
    maxReplicas: 2
    instanceType: m5zn.metal  # Cheapest metal instance for nested virtualization
    autoscaling: false

lifecycle:
  maxTTLHours: 168      # 1 week max
  defaultTTLHours: 48   # 2 days default
  allowCustomTTL: true
  warnBeforeDestroyHours: 4

networking:
  networkType: OVNKubernetes
  clusterNetworks:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  serviceNetwork:
    - 172.30.0.0/16
  machineNetwork:
    - cidr: 10.0.0.0/16

tags:
  required:
    Environment: development
  defaults:
    Purpose: virtualization-testing
    ManagedBy: cluster-control-plane
    Workload: openshift-virtualization
    CostSavings: use-work-hours-hibernation
  allowUserTags: true

features:
  offHoursScaling: false  # Not supported with metal instances
  fipsMode: false
  privateCluster: false

costControls:
  estimatedHourlyCost: 9.08    # 2 workers x $4.54/hr
  maxMonthlyCost: 6538         # Always-on monthly cost
  budgetAlertThreshold: 0.7
  warningMessage: "2x Metal instances cost $9.08/hr ($6,538/month). Enable work hours hibernation to reduce to ~$1,670/month."

platformConfig:
  aws:
    instanceMetadataService: required
    rootVolume:
      type: gp3
      size: 500     # Storage for Windows VM images (QCOW2 files)
      iops: 3000
      throughput: 125

postDeployment:
  enabled: true
  timeout: "5h"  # Extended for Windows image import (2-4h) + VM clone/snapshot creation (20-30min)
  operators:
    - name: kubevirt-hyperconverged
      namespace: openshift-cnv
      source: redhat-operators
      channel: stable
      customResource:
        apiVersion: hco.kubevirt.io/v1beta1
        kind: HyperConverged
        name: kubevirt-hyperconverged
        namespace: openshift-cnv
        spec: {}
  scripts:
    - name: setup-windows-irsa
      path: windows-vm/auto-setup-irsa.sh
      description: "Automated IRSA setup for Windows VM image access from S3"

metadata:
  capabilities:
    - OpenShift Virtualization (HA)
    - Windows VM support (10, 11, Server 2019/2022)
    - Nested virtualization
    - Up to 25-30 concurrent Windows VMs
    - Live migration support
    - High availability for VMs
  capacity:
    maxConcurrentVMs: 30
    recommendedVMSize: 4vCPU-8GB
    totalWorkerCPU: 96         # 2 workers x 48 cores
    totalWorkerRAM: 384        # 2 workers x 192 GB
  notes:
    - "Metal instances take 15-20 minutes to provision (vs 5-10 for standard instances)"
    - "Hibernation start time may be 5-10 minutes due to larger EBS volumes"
    - "Windows licensing is user's responsibility"
    - "OpenShift Virtualization operator installed automatically via post-deployment"
    - "Windows VM infrastructure fully automated - IRSA setup runs automatically during post-deployment"
    - "Windows 10 image source: s3://ocpctl-binaries/windows-images/windows-10-oadp.qcow2 (23GB)"
    - "Image import starts automatically (5-10 min), Windows VMs ready after cluster creation"
    - "500GB storage per worker supports ~10-12 Windows VM images per node (40-50GB each)"
    - "IRSA provides secure, credential-free S3 access (no static credentials stored in cluster)"
    - "Per-cluster IAM roles created automatically for isolation and security"
    - "2 workers enable: VM live migration, pod anti-affinity, full CNV operator HA, and no IPAM controller issues"
