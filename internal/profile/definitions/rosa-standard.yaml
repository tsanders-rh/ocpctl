name: rosa-standard
displayName: ROSA Standard
description: Standard ROSA managed cluster with 3 compute nodes across multiple AZs
  (managed control plane)
platform: aws
clusterType: rosa
track: ga
enabled: true
openshiftVersions:
  allowlist:
  - '4.18'
  - '4.19'
  - '4.20'
  - '4.21'
  default: '4.21'
regions:
  allowlist:
  - us-east-1
  - us-east-2
  - us-west-1
  - us-west-2
  - eu-west-1
  - eu-west-2
  - eu-west-3
  - eu-central-1
  - eu-north-1
  - ap-southeast-1
  - ap-southeast-2
  - ap-northeast-1
  - ap-northeast-2
  - ap-south-1
  - ca-central-1
  - sa-east-1
  default: us-east-1
compute:
  controlPlane:
    replicas: 3
    instanceType: m5.2xlarge
    schedulable: false
    multiAZ: true
  workers:
    replicas: 3
    minReplicas: 2
    maxReplicas: 20
    instanceType: m5.2xlarge
    autoscaling: false
lifecycle:
  maxTTLHours: 168
  defaultTTLHours: 72
  allowCustomTTL: true
  warnBeforeDestroyHours: 2
  offhoursBehavior: hibernate
networking:
  networkType: OVNKubernetes
tags:
  required:
    Environment: production
  defaults:
    Purpose: development
    ManagedBy: cluster-control-plane
    Track: ga
    ClusterType: rosa
  allowUserTags: true
features:
  offHoursScaling: true
  fipsMode: false
  privateCluster: false
costControls:
  estimatedHourlyCost: 1.2
  maxMonthlyCost: 900
  budgetAlertThreshold: 0.8
platformConfig:
  aws:
    rosa:
      stsEnabled: true
      computeNodes: 3
      machineType: m5.2xlarge
      multiAZ: true
