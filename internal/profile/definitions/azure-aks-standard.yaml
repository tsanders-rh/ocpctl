name: azure-aks-standard
displayName: Azure Kubernetes Service Standard
description: Managed Kubernetes cluster on Azure (AKS)
platform: azure
clusterType: aks
track: kube
enabled: true

kubernetesVersions:
  allowlist:
    - "1.35"
    - "1.34"
    - "1.33"
    - "1.32"
    - "1.31"
  default: "1.34"

regions:
  allowlist:
    - eastus
    - eastus2
    - westus
    - westus2
    - centralus
    - northeurope
    - westeurope
  default: eastus

compute:
  workers:
    replicas: 3
    minReplicas: 1
    maxReplicas: 10
    instanceType: Standard_D4s_v3
    autoscaling: true

lifecycle:
  maxTTLHours: 168        # 1 week max
  defaultTTLHours: 72     # 3 days default
  allowCustomTTL: true
  warnBeforeDestroyHours: 4

tags:
  required:
    Environment: development
  defaults:
    Purpose: development
    ManagedBy: ocpctl
    ClusterType: aks
  allowUserTags: true

features:
  offHoursScaling: true

costControls:
  estimatedHourlyCost: 1.01  # Free control plane + worker nodes
  maxMonthlyCost: 730        # Always-on monthly cost (3 nodes)
  budgetAlertThreshold: 0.8
  warningMessage: "AKS Free tier has no control plane cost. Only compute billed."

platformConfig:
  aks:
    kubernetesVersion: "1.34"
    networkPlugin: azure
    networkPolicy: azure
    nodePools:
      - name: system
        vmSize: Standard_D4s_v3
        count: 3
        enableAutoScale: true
        minCount: 1
        maxCount: 10
        osDiskSizeGB: 128

metadata:
  capabilities:
    - Managed Kubernetes control plane (FREE)
    - Azure CNI networking
    - Auto-scaling node pools
    - Azure Active Directory integration
    - Hibernation via node pool scaling
  capacity:
    nodes: "1-10 nodes (autoscaling)"
    vcpu: "12 vCPU (3 nodes baseline)"
    memory: "48 GB RAM (3 nodes baseline)"
  notes:
    - "Control plane: FREE (AKS Free tier)"
    - "Nodes: 3x Standard_D4s_v3 @ $0.336/hr = $1.01/hr"
    - "Total: ~$1.01/hr or $730/month (3 nodes always-on)"
    - "Hibernated cost: ~$0.10/hr (storage only) = 90% savings"
