name: aws-sno-shared
displayName: AWS Single Node OpenShift (SNO) Shared VPC
description: SNO clusters in persistent shared VPC for migration testing
platform: aws
clusterType: openshift
enabled: true
credentialsMode: Auto
openshiftVersions:
  allowlist:
  - '4.18'
  - '4.19'
  - '4.20'
  - '4.21'
  - 4.22.0-ec.5
  default: '4.20'
regions:
  allowlist:
  - us-east-1
  default: us-east-1
baseDomains:
  allowlist:
  - mg.dog8code.com
  default: mg.dog8code.com
compute:
  controlPlane:
    replicas: 1
    instanceType: m6i.2xlarge
    schedulable: true
  workers:
    replicas: 0
    minReplicas: 0
    maxReplicas: 0
    instanceType: m6i.2xlarge
    autoscaling: false
lifecycle:
  maxTTLHours: 24
  defaultTTLHours: 8
  allowCustomTTL: true
  warnBeforeDestroyHours: 1
networking:
  networkType: OVNKubernetes
  clusterNetworks:
  - cidr: 10.128.0.0/14
    hostPrefix: 23
  serviceNetwork:
  - 172.30.0.0/16
  machineNetwork:
  - cidr: 10.0.0.0/16
tags:
  required:
    Environment: test
  defaults:
    Purpose: migration-testing
    ManagedBy: cluster-control-plane
  allowUserTags: true
features:
  offHoursScaling: false
  fipsMode: false
  privateCluster: false
costControls:
  estimatedHourlyCost: 0.8
  maxMonthlyCost: 576
  budgetAlertThreshold: 0.8
platformConfig:
  aws:
    instanceMetadataService: required
    rootVolume:
      type: gp3
      size: 120
      iops: 3000
    subnets:
    - subnet-0656a5d299c74b0eb
    - subnet-04b32b2bd4012eb32
    - subnet-04d051776de6e68b0
    - subnet-09c061637a4635ee9
    - subnet-0d962c28e4b18a1cd
    - subnet-0af639cab1051104c
