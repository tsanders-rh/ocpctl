name: aws-virtualization-prerelease
displayName: AWS OpenShift Virtualization
description: Cluster optimized for OpenShift Virtualization pre-release testing with bare metal instances supporting nested virtualization
platform: aws
track: prerelease
enabled: true
credentialsMode: Mint

openshiftVersions:
  allowlist:
    - "4.22.0-ec.5"   # Early Candidate 5 (RHEL9 FIPS)
  default: "4.22.0-ec.5"

regions:
  allowlist:
    - us-east-1
    - us-east-2
    - us-west-2
    - eu-west-1
    - eu-west-2
    - eu-west-3
    - eu-central-1
    - eu-north-1
    - ap-southeast-1
    - ap-southeast-2
    - ap-northeast-1
    - ap-northeast-2
    - ap-south-1
    - ca-central-1
    - sa-east-1
  default: us-east-1

baseDomains:
  allowlist:
    - mg.dog8code.com
  default: mg.dog8code.com

compute:
  controlPlane:
    replicas: 3
    instanceType: m6i.xlarge
    schedulable: false
  workers:
    replicas: 2
    minReplicas: 2
    maxReplicas: 2
    instanceType: m5zn.metal  # Cheapest metal instance for nested virtualization
    autoscaling: false

lifecycle:
  maxTTLHours: 24
  defaultTTLHours: 8
  allowCustomTTL: true
  warnBeforeDestroyHours: 1

networking:
  networkType: OVNKubernetes
  clusterNetworks:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  serviceNetwork:
    - 172.30.0.0/16
  machineNetwork:
    - cidr: 10.0.0.0/16

tags:
  required:
    Environment: test
  defaults:
    Purpose: prerelease-testing
    ManagedBy: cluster-control-plane
    Workload: openshift-virtualization
    Track: prerelease
  allowUserTags: true

features:
  offHoursScaling: false
  fipsMode: false
  privateCluster: false

costControls:
  estimatedHourlyCost: 9.08    # 2 workers x $4.54/hr
  maxMonthlyCost: 6538         # Always-on monthly cost
  budgetAlertThreshold: 0.7
  warningMessage: "2x Metal instances cost $9.08/hr ($6,538/month). Enable work hours hibernation to reduce to ~$1,670/month."

platformConfig:
  aws:
    instanceMetadataService: required
    rootVolume:
      type: gp3
      size: 500     # Storage for Windows VM images (QCOW2 files)
      iops: 3000
      throughput: 125

metadata:
  capabilities:
    - bare-metal
  notes:
    - "Uses metal instances for nested virtualization support"
    - "Optimized for OpenShift Virtualization workloads"
