name: rosa-minimal
displayName: ROSA Minimal
description: Minimal ROSA managed cluster with 2 compute nodes (managed control plane)
platform: aws
clusterType: rosa
track: ga
enabled: true
openshiftVersions:
  allowlist:
  - '4.18'
  - '4.19'
  - '4.20'
  - '4.21'
  default: '4.21'
regions:
  allowlist:
  - us-east-1
  - us-east-2
  - us-west-1
  - us-west-2
  - eu-west-1
  - eu-west-2
  - eu-west-3
  - eu-central-1
  - eu-north-1
  - ap-southeast-1
  - ap-southeast-2
  - ap-northeast-1
  - ap-northeast-2
  - ap-south-1
  - ca-central-1
  - sa-east-1
  default: us-east-1
compute:
  controlPlane:
    replicas: 3
    instanceType: m5.2xlarge
    schedulable: false
    multiAZ: false
  workers:
    replicas: 2
    minReplicas: 2
    maxReplicas: 10
    instanceType: m5.xlarge
    autoscaling: false
lifecycle:
  maxTTLHours: 72
  defaultTTLHours: 24
  allowCustomTTL: true
  warnBeforeDestroyHours: 2
  offhoursBehavior: hibernate
networking:
  networkType: OVNKubernetes
tags:
  required:
    Environment: production
  defaults:
    Purpose: stable-testing
    ManagedBy: cluster-control-plane
    Track: ga
    ClusterType: rosa
  allowUserTags: true
features:
  offHoursScaling: true
  fipsMode: false
  privateCluster: false
costControls:
  estimatedHourlyCost: 0.42
  maxMonthlyCost: 310
  budgetAlertThreshold: 0.8
platformConfig:
  aws:
    rosa:
      stsEnabled: true
      computeNodes: 2
      machineType: m5.xlarge
