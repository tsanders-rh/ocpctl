id: kubernetes-dashboard
name: Kubernetes Dashboard
description: Web-based Kubernetes user interface for managing and troubleshooting applications. Provides token-based authentication and cluster visualization.
category: monitoring
enabled: true
supportedPlatforms:
  - eks
  - gke
  - iks

versions:
  - channel: v2.7.0
    displayName: "Dashboard v2.7.0"
    isDefault: true
    config:
      manifests:
        - name: kubernetes-dashboard
          description: "Kubernetes Dashboard v2.7.0 with token-based authentication and LoadBalancer service"
          url: "https://raw.githubusercontent.com/kubernetes/dashboard/v2.7.0/aio/deploy/recommended.yaml"
          namespace: kubernetes-dashboard

metadata:
  notes:
    - "Provides web-based UI for managing Kubernetes clusters"
    - "Token-based authentication for secure access"
    - "Supports viewing resources, logs, and cluster health"
    - "Automatically creates kubernetes-dashboard namespace"
    - "Accessible via LoadBalancer service after deployment"
  warnings:
    - "Default configuration uses LoadBalancer service (incurs cloud provider costs)"
    - "Ensure token-based authentication is properly configured before exposing publicly"
    - "Not recommended for production clusters without additional security hardening"
