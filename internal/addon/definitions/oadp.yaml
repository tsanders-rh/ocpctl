# Add-on metadata
id: oadp
name: OpenShift API for Data Protection (OADP)
description: Backup and restore OpenShift clusters and applications using Velero. Provides disaster recovery capabilities and data protection.
category: backup
enabled: true
supportedPlatforms:
  - openshift

# All available versions
versions:
  - channel: stable
    displayName: "OADP 1.5 (Stable)"
    isDefault: true
    config:
      operators:
        - name: redhat-oadp-operator
          namespace: openshift-adp
          source: redhat-operators
          channel: stable
      manifests:
        - name: oadp-dpa-config
          description: "DataProtectionApplication configuration (platform and profile-aware)"
          content: |
            apiVersion: oadp.openshift.io/v1alpha1
            kind: DataProtectionApplication
            metadata:
              name: oadp-dpa
              namespace: openshift-adp
            spec:
              configuration:
                velero:
                  defaultPlugins:
                    - openshift
                    {{- if or (eq .Platform "aws") (eq .Platform "ibmcloud")}}
                    - aws
                    {{- end}}
                    {{- if contains .Profile "virt"}}
                    - kubevirt
                    - csi
                    {{- end}}
                  {{- if contains .Profile "virt"}}
                  resourceTimeout: 10m
                  {{- end}}
                {{- if contains .Profile "virt"}}
                nodeAgent:
                  enable: true
                  uploaderType: kopia
                {{- end}}
