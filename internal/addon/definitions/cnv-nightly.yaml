            echo "✓ quay.io credentials verified"
            rm -f /tmp/pull-secret.json
          timeout: "60s"

        - name: setup-windows-vm-infrastructure
          description: Setup Windows VM infrastructure with IRSA and S3 image import
          path: windows-vm/auto-setup-irsa.sh
          timeout: "5h"
          dependsOn:
            - kubevirt-hyperconverged

      manifests:
        - name: cnv-stable-stage-catalogsource
