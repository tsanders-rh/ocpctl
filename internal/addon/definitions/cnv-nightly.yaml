metadata:
  requiresBareMetal: true
  notes:
    - "Requires bare metal instances (AWS: *.metal, GCP: custom nested virt enabled)"
    - "Stable-Stage (CNV 4.22): Pre-production stable builds for testing before GA release"
    - "Nightly (CNV 4.99): Pre-release/nightly builds - not recommended for production"
    - "Stable-Stage uses catalog from quay.io/openshift-cnv/nightly-catalog:4.22 with nightly-4.22 channel"
    - "Nightly uses catalog from quay.io/openshift-cnv/nightly-catalog:4.99 with nightly-4.99 channel"
    - "Equivalent to: CNV_VERSION=4.22.0 CNV_SOURCE=stable-stage (for 4.22)"
    - "Equivalent to: CNV_VERSION=4.99.0 CNV_SOURCE=pre-release (for 4.99)"
    - "REQUIRES: General quay.io credentials in cluster pull secret (should be in profile)"
    - "Automatically creates openshift-cnv namespace"
    - "Includes HyperConverged CR with default configuration"
    - "Operator subscription polls for updates every 30 minutes"
    - "Windows VM Support versions available for both 4.22 and 4.99"
    - "Windows versions add automated Windows 10 VM infrastructure setup (2-4h for image import)"
    - "Windows versions create IRSA role, import 70GB Windows 10 image from S3, and provision test VM"
    - "Windows VM ready after post-config completes - supports up to 25-30 concurrent Windows VMs on metal workers"
  warnings:
    - "Pre-release builds are not GA and may have bugs"
    - "Stable-Stage (4.22) is pre-production - use for testing before GA"
    - "Nightly builds (4.99) may contain experimental or unstable features"
    - "High resource requirements - recommend 3+ worker nodes"
    - "Requires general quay.io registry credentials (not just quay.io/openshift-cnv)"
    - "Windows VM Support adds 2-4 hours to post-deployment time for image download and conversion"
    - "Windows version requires AWS (IRSA for S3 access) - not supported on other clouds yet"
