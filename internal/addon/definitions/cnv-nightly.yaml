id: cnv-nightly
name: OpenShift Virtualization (Pre-Release)
description: OpenShift Virtualization pre-release/nightly builds (4.99.0) for testing unreleased features. Includes KubeVirt for running VMs on OpenShift. Requires bare metal or nested virtualization support and access to Red Hat internal registry.
category: virtualization
enabled: true
supportedPlatforms:
  - openshift

versions:
  - channel: nightly
    displayName: "CNV Pre-Release (4.99.0)"
    isDefault: true
    config:
      scripts:
        - name: setup-registry-access
          description: Configure pull secret for Red Hat internal registry access
          content: |
            #!/bin/bash
            set -euo pipefail

            echo "Checking if registry-proxy.engineering.redhat.com credentials exist..."

            # Check if pull secret already has registry-proxy credentials
            if oc get secret pull-secret -n openshift-config -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d | grep -q "registry-proxy.engineering.redhat.com"; then
              echo "✓ Pull secret already contains registry-proxy.engineering.redhat.com credentials"
            else
              echo "⚠ Pull secret does not contain registry-proxy.engineering.redhat.com credentials"
              echo "Please add Red Hat internal registry credentials to your pull secret:"
              echo ""
              echo "1. Get your auth token from https://registry-proxy.engineering.redhat.com"
              echo "2. Run: oc set data secret/pull-secret -n openshift-config --from-file=.dockerconfigjson=<updated-pull-secret>"
              echo ""
              echo "Alternatively, merge credentials using:"
              echo "  oc get secret pull-secret -n openshift-config -o json | jq -r '.data.\".dockerconfigjson\"' | base64 -d > current-pull-secret.json"
              echo "  # Merge with your registry-proxy credentials"
              echo "  oc set data secret/pull-secret -n openshift-config --from-file=.dockerconfigjson=merged-pull-secret.json"
              exit 1
            fi
          timeout: 5m

      manifests:
        - name: cnv-nightly-catalogsource
          description: CatalogSource for CNV pre-release (nightly) builds
          content: |
            apiVersion: operators.coreos.com/v1alpha1
            kind: CatalogSource
            metadata:
              name: cnv-nightly
              namespace: openshift-marketplace
              labels:
                cnv-source: pre-release
                cnv-version: "4.99.0"
            spec:
              sourceType: grpc
              image: registry-proxy.engineering.redhat.com/rh-osbs/container-native-virtualization-hco-bundle-registry:4.99.0
              displayName: OpenShift Virtualization Pre-Release (4.99.0)
              publisher: Red Hat
              updateStrategy:
                registryPoll:
                  interval: 30m
          namespace: openshift-marketplace
          dependsOn:
            - setup-registry-access

      operators:
        - name: kubevirt-hyperconverged
          namespace: openshift-cnv
          source: cnv-nightly
          channel: nightly
          dependsOn:
            - cnv-nightly-catalogsource
          customResource:
            apiVersion: hco.kubevirt.io/v1beta1
            kind: HyperConverged
            name: kubevirt-hyperconverged
            namespace: openshift-cnv
            spec:
              featureGates:
                deployKubeSecondaryDNS: false
                enableCommonBootImageImport: true
              certConfig:
                ca:
                  duration: 48h0m0s
                  renewBefore: 24h0m0s
                server:
                  duration: 24h0m0s
                  renewBefore: 12h0m0s

metadata:
  requiresBareMetal: true
  notes:
    - "Requires bare metal instances (AWS: *.metal, GCP: custom nested virt enabled)"
    - "Pre-release/nightly builds (CNV 4.99.0) - not recommended for production"
    - "Uses pre-release index from registry-proxy.engineering.redhat.com"
    - "Equivalent to: CNV_VERSION=4.99.0 CNV_SOURCE=pre-release"
    - "Automatically creates openshift-cnv namespace"
    - "Includes HyperConverged CR with default configuration"
    - "Operator subscription polls for updates every 30 minutes"
  warnings:
    - "Pre-release builds are not GA and may have bugs"
    - "Requires access to Red Hat internal registry (registry-proxy.engineering.redhat.com)"
    - "High resource requirements - recommend 3+ worker nodes"
    - "Version 4.99.0 indicates pre-release/nightly builds"
