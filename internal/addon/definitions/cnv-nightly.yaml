id: cnv-nightly
name: OpenShift Virtualization (Pre-Release)
description: OpenShift Virtualization pre-release builds including stable-stage (4.22) and nightly (4.99) for testing unreleased features. Includes KubeVirt for running VMs on OpenShift. Requires bare metal or nested virtualization support.
category: virtualization
enabled: true
supportedPlatforms:
  - openshift

versions:
  - channel: stable-stage
    displayName: "CNV Stable-Stage (4.22.0)"
    isDefault: true
    config:
      scripts:
        - name: verify-quay-credentials
          description: Verify quay.io credentials are present in pull secret
          content: |
            #!/bin/bash
            set -euo pipefail

            echo "Verifying quay.io credentials in pull secret..."

            # Get current pull secret
            kubectl get secret pull-secret -n openshift-config -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d > /tmp/pull-secret.json

            # Check if quay.io credentials are present
            if ! jq -e '.auths."quay.io"' /tmp/pull-secret.json > /dev/null 2>&1; then
              echo "ERROR: General quay.io credentials not found in pull secret"
              echo "The CNV stable-stage catalog requires general quay.io access."
              echo ""
              echo "Please ensure your cluster's pull secret includes credentials for 'quay.io'"
              echo "This should be configured in your cluster profile or base pull secret."
              rm -f /tmp/pull-secret.json
              exit 1
            fi

            echo "✓ quay.io credentials verified"
            rm -f /tmp/pull-secret.json
          timeout: "60s"
      manifests:
        - name: cnv-stable-stage-catalogsource
          description: CatalogSource for CNV stable-stage (4.22) builds
          content: |
            apiVersion: operators.coreos.com/v1alpha1
            kind: CatalogSource
            metadata:
              name: cnv-stable-stage
              namespace: openshift-marketplace
              labels:
                cnv-source: stable-stage
                cnv-version: "4.22.0"
            spec:
              sourceType: grpc
              image: quay.io/openshift-cnv/nightly-catalog:4.22
              displayName: OpenShift Virtualization Stable-Stage (4.22)
              publisher: Red Hat
              updateStrategy:
                registryPoll:
                  interval: 30m
          namespace: openshift-marketplace
          dependsOn:
            - verify-quay-credentials

      operators:
        - name: kubevirt-hyperconverged
          namespace: openshift-cnv
          source: cnv-stable-stage
          channel: nightly-4.22
          dependsOn:
            - verify-quay-credentials
            - cnv-stable-stage-catalogsource
          customResource:
            apiVersion: hco.kubevirt.io/v1beta1
            kind: HyperConverged
            name: kubevirt-hyperconverged
            namespace: openshift-cnv
            spec:
              featureGates:
                deployKubeSecondaryDNS: false
                enableCommonBootImageImport: true
              certConfig:
                ca:
                  duration: 48h0m0s
                  renewBefore: 24h0m0s
                server:
                  duration: 24h0m0s
                  renewBefore: 12h0m0s

  # Windows VM Support for 4.22
