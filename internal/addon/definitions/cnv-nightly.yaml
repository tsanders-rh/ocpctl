id: cnv-nightly
name: OpenShift Virtualization (Pre-Release)
description: OpenShift Virtualization pre-release/nightly builds (4.99) for testing unreleased features. Includes KubeVirt for running VMs on OpenShift. Requires bare metal or nested virtualization support.
category: virtualization
enabled: true
supportedPlatforms:
  - openshift

versions:
  - channel: nightly
    displayName: "CNV Pre-Release (4.99.0)"
    isDefault: true
    config:
      scripts:
        - name: verify-quay-credentials
          description: Verify quay.io credentials are present in pull secret
          content: |
            #!/bin/bash
            set -euo pipefail

            echo "Verifying quay.io credentials in pull secret..."

            # Get current pull secret
            kubectl get secret pull-secret -n openshift-config -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d > /tmp/pull-secret.json

            # Check if quay.io credentials are present
            if ! jq -e '.auths."quay.io"' /tmp/pull-secret.json > /dev/null 2>&1; then
              echo "ERROR: General quay.io credentials not found in pull secret"
              echo "The CNV nightly catalog requires general quay.io access."
              echo ""
              echo "Please ensure your cluster's pull secret includes credentials for 'quay.io'"
              echo "This should be configured in your cluster profile or base pull secret."
              rm -f /tmp/pull-secret.json
              exit 1
            fi

            echo "✓ quay.io credentials verified"
            rm -f /tmp/pull-secret.json
          timeout: 60
      manifests:
        - name: cnv-nightly-catalogsource
          description: CatalogSource for CNV pre-release (nightly) builds
          content: |
            apiVersion: operators.coreos.com/v1alpha1
            kind: CatalogSource
            metadata:
              name: cnv-nightly
              namespace: openshift-marketplace
              labels:
                cnv-source: pre-release
                cnv-version: "4.99.0"
            spec:
              sourceType: grpc
              image: quay.io/openshift-cnv/nightly-catalog:4.99
              displayName: OpenShift Virtualization Pre-Release (4.99)
              publisher: Red Hat
              updateStrategy:
                registryPoll:
                  interval: 30m
          namespace: openshift-marketplace
          dependsOn:
            - verify-quay-credentials

      operators:
        - name: kubevirt-hyperconverged
          namespace: openshift-cnv
          source: cnv-nightly
          channel: nightly
          dependsOn:
            - verify-quay-credentials
            - cnv-nightly-catalogsource
          customResource:
            apiVersion: hco.kubevirt.io/v1beta1
            kind: HyperConverged
            name: kubevirt-hyperconverged
            namespace: openshift-cnv
            spec:
              featureGates:
                deployKubeSecondaryDNS: false
                enableCommonBootImageImport: true
              certConfig:
                ca:
                  duration: 48h0m0s
                  renewBefore: 24h0m0s
                server:
                  duration: 24h0m0s
                  renewBefore: 12h0m0s

metadata:
  requiresBareMetal: true
  notes:
    - "Requires bare metal instances (AWS: *.metal, GCP: custom nested virt enabled)"
    - "Pre-release/nightly builds (CNV 4.99) - not recommended for production"
    - "Uses pre-release catalog from quay.io/openshift-cnv/nightly-catalog:4.99"
    - "Equivalent to: CNV_VERSION=4.99.0 CNV_SOURCE=pre-release"
    - "REQUIRES: General quay.io credentials in cluster pull secret (should be in profile)"
    - "Automatically creates openshift-cnv namespace"
    - "Includes HyperConverged CR with default configuration"
    - "Operator subscription polls for updates every 30 minutes"
  warnings:
    - "Pre-release builds are not GA and may have bugs"
    - "Uses nightly catalog - may contain experimental or unstable features"
    - "High resource requirements - recommend 3+ worker nodes"
    - "Version 4.99 indicates pre-release/nightly builds"
    - "Requires general quay.io registry credentials (not just quay.io/openshift-cnv)"
