id: mta
name: Migration Toolkit for Applications (MTA)
description: Modernize and migrate applications to containers. Analyze applications, identify migration issues, and provide transformation guidance.
category: migration
enabled: true
supportedPlatforms:
  - openshift

versions:
  - channel: stable-v6.0
    displayName: "MTA 6.0"
    isDefault: false
    config:
      operators:
        - name: mta-operator
          namespace: openshift-mta
          source: redhat-operators
          channel: stable-v6.0
      manifests:
        - name: mta-tackle-instance
          description: "Tackle instance for Migration Toolkit for Applications"
          content: |
            apiVersion: tackle.konveyor.io/v1alpha1
            kind: Tackle
            metadata:
              name: tackle
              namespace: openshift-mta
            spec:
              feature_auth_required: "false"
              rwx_supported: "false"

