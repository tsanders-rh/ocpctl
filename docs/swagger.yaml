      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api.StorageGroupResponse'
            type: array
        "403":
          description: Forbidden - not cluster owner
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Cluster not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get cluster storage
      tags:
      - Storage
  /clusters/{id}/storage/link:
    post:
      consumes:
      - application/json
      description: Links persistent storage from another cluster to this cluster
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      - description: Link storage request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.LinkStorageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.StorageGroupResponse'
        "400":
          description: Invalid request or validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - not cluster owner
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Cluster not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
