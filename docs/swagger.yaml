      started_at:
        type: string
      status:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.JobStatus'
      updated_at:
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_pkg_types.JobMetadata:
    additionalProperties: true
    type: object
  github_com_tsanders-rh_ocpctl_pkg_types.JobStatus:
    enum:
    - PENDING
    - RUNNING
    - SUCCEEDED
    - FAILED
    - RETRYING
    type: string
    x-enum-varnames:
    - JobStatusPending
    - JobStatusRunning
    - JobStatusSucceeded
    - JobStatusFailed
    - JobStatusRetrying
  github_com_tsanders-rh_ocpctl_pkg_types.JobType:
    enum:
    - CREATE
    - DESTROY
    - SCALE_WORKERS
    - JANITOR_DESTROY
    - ORPHAN_SWEEP
    - CONFIGURE_EFS
    - PROVISION_SHARED_STORAGE
    - UNLINK_SHARED_STORAGE
    - HIBERNATE
    - RESUME
    - POST_CONFIGURE
    type: string
    x-enum-varnames:
    - JobTypeCreate
    - JobTypeDestroy
    - JobTypeScaleWorkers
    - JobTypeJanitorDestroy
    - JobTypeOrphanSweep
    - JobTypeConfigureEFS
    - JobTypeProvisionSharedStorage
    - JobTypeUnlinkSharedStorage
    - JobTypeHibernate
    - JobTypeResume
    - JobTypePostConfigure
  github_com_tsanders-rh_ocpctl_pkg_types.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  github_com_tsanders-rh_ocpctl_pkg_types.LoginResponse:
    properties:
