      ttl_hours:
        type: integer
      version:
        type: string
      work_hours:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.WorkHoursSchedule'
      work_hours_enabled:
        type: boolean
    required:
    - cluster_type
    - cost_center
    - name
    - owner
    - platform
    - profile
    - region
    - team
    - version
    type: object
  internal_api.ErrorResponse:
    properties:
      details:
        items:
          additionalProperties: true
          type: object
        type: array
      error:
        type: string
      message:
        type: string
    type: object
  internal_api.ExtendClusterRequest:
    properties:
      ttl_hours:
        minimum: 1
        type: integer
    required:
    - ttl_hours
    type: object
  internal_api.InfrastructureInfo:
    properties:
      api_server:
        properties:
          ip:
            type: string
          status:
            type: string
          uptime:
            type: string
          version:
            type: string
        type: object
      autoscale_group:
        $ref: '#/definitions/internal_api.ASGInfo'
      database:
        properties:
          host:
            type: string
          status:
            type: string
        type: object
      static_workers:
        items:
          $ref: '#/definitions/internal_api.WorkerInfo'
        type: array
      timestamp:
        type: string
    type: object
  internal_api.KubeadminCredentials:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  internal_api.LinkStorageRequest:
    properties:
      target_cluster_id:
        type: string
    required:
    - target_cluster_id
    type: object
  internal_api.MarkIgnoredRequest:
    properties:
      notes:
        type: string
    type: object
  internal_api.MarkResolvedRequest:
    properties:
      notes:
        type: string
    type: object
  internal_api.OrphanedResourceListResponse:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      resources:
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.OrphanedResource'
        type: array
      total:
        type: integer
    type: object
  internal_api.PaginatedResponse:
    properties:
      data: {}
      filters:
        additionalProperties: true
        type: object
      pagination:
        $ref: '#/definitions/internal_api.PaginationMeta'
    type: object
  internal_api.PaginationMeta:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  internal_api.ProfileCostBreakdown:
    properties:
      cluster_count:
        type: integer
      daily_cost:
        type: number
      hourly_cost:
        type: number
      monthly_cost:
        type: number
      profile:
        type: string
    type: object
  internal_api.ProfileResponse:
    properties:
      base_domains:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.BaseDomainConfig'
      compute:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.ComputeConfig'
      cost_controls:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.CostControlsConfig'
      description:
        type: string
      display_name:
        type: string
      enabled:
        type: boolean
      features:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.FeaturesConfig'
      kubernetes_versions:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.VersionConfig'
      lifecycle:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.LifecycleConfig'
      name:
        type: string
      networking:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.NetworkingConfig'
      openshift_versions:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.VersionConfig'
      platform:
        type: string
      post_deployment:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.PostDeploymentConfig'
      regions:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.RegionConfig'
      tags:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.TagsConfig'
    type: object
  internal_api.StorageGroupResponse:
    properties:
      created_at:
        type: string
      efs_id:
        type: string
      efs_security_group_id:
        type: string
      id:
        type: string
      linked_clusters:
        items:
          $ref: '#/definitions/internal_api.ClusterStorageLinkResponse'
        type: array
      name:
        type: string
      region:
        type: string
      s3_bucket:
        type: string
      status:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.StorageGroupStatus'
      updated_at:
        type: string
    type: object
  internal_api.UserCostBreakdown:
    properties:
      cluster_count:
        type: integer
      daily_cost:
        type: number
      hourly_cost:
        type: number
      monthly_cost:
        type: number
      user_id:
        type: string
      username:
        type: string
    type: object
  internal_api.WorkerInfo:
    properties:
      health_status:
        type: string
      instance_id:
        type: string
      launch_time:
        type: string
      private_ip:
        type: string
      public_ip:
        type: string
      state:
        type: string
      type:
        description: '"static" or "autoscale"'
        type: string
      version:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: OCPCTL Support
    url: http://github.com/tsanders-rh/ocpctl/issues
  description: OCPCTL is a self-service OpenShift cluster provisioning and management
    platform. This API provides endpoints for creating, managing, and destroying OpenShift
    clusters with automated lifecycle management, policy enforcement, and resource
    tracking.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://github.com/tsanders-rh/ocpctl
  title: OCPCTL API
  version: "1.0"
paths:
  /admin/clusters/statistics:
    get:
      description: Returns aggregated statistics for all clusters (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.ClusterStatistics'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get cluster statistics
      tags:
      - admin
  /admin/orphaned-resources:
    get:
      consumes:
      - application/json
      description: Lists orphaned AWS resources that were detected by the janitor.
        Supports filtering by status, type, and region.
      parameters:
      - description: Filter by status (active, resolved, ignored)
        in: query
        name: status
        type: string
      - description: Filter by resource type (VPC, LoadBalancer, HostedZone, DNSRecord,
          EC2Instance, S3Bucket)
        in: query
        name: type
        type: string
      - description: Filter by AWS region
        in: query
        name: region
        type: string
      - description: Maximum number of results (default 50, max 100)
        in: query
        name: limit
        type: integer
      - description: Number of results to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.OrphanedResourceListResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List orphaned resources
      tags:
      - Orphaned Resources
  /admin/orphaned-resources/{id}:
    delete:
      consumes:
      - application/json
      description: Actually deletes the orphaned resource from AWS (currently supports
        HostedZone and DNSRecord only). Other resource types must be deleted manually
        in AWS Console.
      parameters:
      - description: Resource ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.OrphanedResource'
        "400":
          description: Resource type not supported for automated deletion
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Resource not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to delete resource from AWS
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete orphaned AWS resource
      tags:
      - Orphaned Resources
  /admin/orphaned-resources/{id}/ignore:
    patch:
      consumes:
      - application/json
      description: Marks an orphaned resource as ignored (e.g., false positive or
        intentionally kept)
      parameters:
      - description: Resource ID
        in: path
        name: id
        required: true
        type: string
      - description: Ignore reason
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.MarkIgnoredRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.OrphanedResource'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Mark orphaned resource as ignored
      tags:
      - Orphaned Resources
  /admin/orphaned-resources/{id}/resolve:
    patch:
      consumes:
      - application/json
      description: Marks an orphaned resource as resolved (e.g., after manual cleanup
        in AWS Console)
      parameters:
      - description: Resource ID
        in: path
        name: id
        required: true
        type: string
      - description: Resolution notes
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.MarkResolvedRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.OrphanedResource'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Mark orphaned resource as resolved
      tags:
      - Orphaned Resources
  /admin/orphaned-resources/stats:
    get:
      consumes:
      - application/json
      description: Returns aggregated statistics about orphaned resources grouped
        by type and status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get orphaned resources statistics
      tags:
      - Orphaned Resources
  /admin/system/infrastructure:
    get:
      description: Returns information about API server, workers, and autoscaling
        groups
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.InfrastructureInfo'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get infrastructure status
      tags:
      - system
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates user with email and password. Returns JWT access
        token and sets httpOnly refresh token cookie.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.LoginResponse'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid email or password
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Account is disabled
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User login
      tags:
      - Authentication
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes refresh token and clears authentication cookies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User logout
      tags:
      - Authentication
  /auth/me:
    get:
      consumes:
      - application/json
      description: Returns profile information for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.UserResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - Authentication
    patch:
      consumes:
      - application/json
      description: Updates profile information for the authenticated user (username,
        timezone, work hours)
      parameters:
      - description: Profile update fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.UpdateMeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.UserResponse'
        "400":
          description: Invalid request or validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to update user
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update current user profile
      tags:
      - Authentication
  /auth/password:
    post:
      consumes:
      - application/json
      description: Changes the authenticated user's password. Requires current password.
        Invalidates all sessions.
      parameters:
      - description: Password change request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request or weak password
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Current password is incorrect
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to update password
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - Authentication
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Generates a new access token using the refresh token from httpOnly
        cookie
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.LoginResponse'
        "401":
          description: Invalid or expired refresh token
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Account is disabled
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to generate token
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh access token
      tags:
      - Authentication
  /clusters:
    get:
      description: Lists all clusters accessible to the authenticated user. Admins
        see all clusters, regular users see only their own.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 50
        description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Filter by platform (aws, ibmcloud)
        in: query
        name: platform
        type: string
      - description: Filter by profile name
        in: query
        name: profile
        type: string
      - description: Filter by owner email (admin only)
        in: query
        name: owner
        type: string
      - description: Filter by team
        in: query
        name: team
        type: string
      - description: Filter by cost center
        in: query
        name: cost_center
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_api.PaginatedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.Cluster'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List clusters
      tags:
      - clusters
    post:
      consumes:
      - application/json
      description: Creates a new OpenShift cluster with the specified configuration.
        Validates against policy engine and initiates async provisioning.
      parameters:
      - description: Cluster configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.CreateClusterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.Cluster'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create cluster
      tags:
      - clusters
  /clusters/{id}:
    delete:
      description: Initiates cluster destruction. Creates a background job to deprovision
        all cluster resources.
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.Cluster'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete cluster
      tags:
      - clusters
    get:
      description: Retrieves details of a specific cluster by ID
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.Cluster'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get cluster
      tags:
      - clusters
  /clusters/{id}/configurations:
    get:
      consumes:
      - application/json
      description: Returns all post-deployment configurations for a cluster
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Cluster not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List cluster configurations
      tags:
      - Configurations
  /clusters/{id}/configurations/{config_id}/retry:
    patch:
      consumes:
      - application/json
      description: Retries a failed post-deployment configuration by creating a new
        job
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      - description: Configuration ID
        in: path
        name: config_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Configuration not failed or doesn't belong to cluster
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Cluster or configuration not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Retry failed configuration
      tags:
      - Configurations
  /clusters/{id}/configure:
    post:
      consumes:
      - application/json
      description: Manually triggers post-deployment configuration for a ready cluster
        (useful if skipped during creation)
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Cluster not ready, already configured, or job already running
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Cluster not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Trigger post-deployment configuration
      tags:
      - Configurations
  /clusters/{id}/extend:
    patch:
      consumes:
      - application/json
      description: Extends the time-to-live (TTL) of a cluster, postponing its automatic
        destruction
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      - description: TTL extension request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.ExtendClusterRequest'
