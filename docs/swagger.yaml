basePath: /api/v1
definitions:
  github_com_tsanders-rh_ocpctl_internal_profile.BaseDomainConfig:
    properties:
      allowed:
        items:
          type: string
        minItems: 1
        type: array
      default:
        type: string
    required:
    - allowed
    - default
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.ClusterNetworkConfig:
    properties:
      cidr:
        type: string
      hostPrefix:
        type: integer
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.ComputeConfig:
    properties:
      control_plane:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.ControlPlaneConfig'
      managed_node_groups:
        description: For EKS (managed)
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.NodeGroupConfig'
        type: array
      node_groups:
        description: For EKS (unmanaged)
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.NodeGroupConfig'
        type: array
      workers:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.WorkersConfig'
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.ControlPlaneConfig:
    properties:
      instance_type:
        type: string
      replicas:
        minimum: 1
        type: integer
      schedulable:
        type: boolean
    required:
    - instance_type
    - replicas
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.CostControlsConfig:
    properties:
      budget_alert_threshold:
        maximum: 1
        minimum: 0
        type: number
      estimated_hourly_cost:
        type: number
      max_monthly_cost:
        type: number
      warning_message:
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.CustomResourceConfig:
    properties:
      api_version:
        type: string
      kind:
        type: string
      name:
        type: string
      namespace:
        type: string
      spec:
        additionalProperties: true
        type: object
    required:
    - api_version
    - kind
    - name
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.FeaturesConfig:
    properties:
      fips_mode:
        type: boolean
      off_hours_scaling:
        type: boolean
      oidc_provider:
        description: EKS-specific
        type: boolean
      private_cluster:
        type: boolean
      private_service_endpoint:
        type: boolean
      public_service_endpoint:
        description: IKS-specific
        type: boolean
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.HelmChartConfig:
    properties:
      chart:
        type: string
      name:
        type: string
      repo:
        type: string
      values:
        additionalProperties: true
        type: object
    required:
    - chart
    - name
    - repo
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.LifecycleConfig:
    properties:
      allow_custom_ttl:
        type: boolean
      default_ttl_hours:
        minimum: 1
        type: integer
      max_ttl_hours:
        minimum: 1
        type: integer
      warn_before_destroy_hours:
        minimum: 0
        type: integer
    required:
    - default_ttl_hours
    - max_ttl_hours
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.MachineNetworkConfig:
    properties:
      cidr:
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.ManifestConfig:
    properties:
      description:
        type: string
      name:
        type: string
      namespace:
        description: Target namespace for the manifest
        type: string
      path:
        description: Local file path
        type: string
      url:
        description: Remote URL (e.g. GitHub raw URL)
        type: string
    required:
    - name
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.NetworkingConfig:
    properties:
      clusterNetworks:
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.ClusterNetworkConfig'
        type: array
      machineNetwork:
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.MachineNetworkConfig'
        type: array
      nat_gateway:
        description: '"Single" or "HighlyAvailable"'
        type: string
      networkType:
        type: string
      serviceNetwork:
        items:
          type: string
        type: array
      vpc_cidr:
        description: EKS-specific fields
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.NodeGroupConfig:
    properties:
      ami_family:
        description: For managed node groups (AmazonLinux2023, AmazonLinux2, etc.)
        type: string
      desired_capacity:
        minimum: 1
        type: integer
      instance_type:
        type: string
      max_size:
        type: integer
      min_size:
        minimum: 0
        type: integer
      name:
        type: string
      volume_size:
        type: integer
      volume_type:
        type: string
    required:
    - desired_capacity
    - instance_type
    - max_size
    - min_size
    - name
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.OperatorConfig:
    properties:
      channel:
        type: string
      custom_resource:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.CustomResourceConfig'
      name:
        type: string
      namespace:
        type: string
      source:
        description: e.g. "redhat-operators"
        type: string
    required:
    - channel
    - name
    - namespace
    - source
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.PostDeploymentConfig:
    properties:
      enabled:
        type: boolean
      helm_charts:
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.HelmChartConfig'
        type: array
      manifests:
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.ManifestConfig'
        type: array
      operators:
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.OperatorConfig'
        type: array
      scripts:
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.ScriptConfig'
        type: array
      timeout:
        description: Duration string, e.g. "30m"
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.RegionConfig:
    properties:
      allowed:
        items:
          type: string
        minItems: 1
        type: array
      default:
        type: string
    required:
    - allowed
    - default
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.ScriptConfig:
    properties:
      description:
        type: string
      env:
        additionalProperties:
          type: string
        description: Additional environment variables
        type: object
      name:
        type: string
      path:
        type: string
    required:
    - name
    - path
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.TagsConfig:
    properties:
      allow_user_tags:
        type: boolean
      defaults:
        additionalProperties:
          type: string
        type: object
      required:
        additionalProperties:
          type: string
        type: object
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.VersionConfig:
    properties:
      allowed:
        items:
          type: string
        minItems: 1
        type: array
      default:
        type: string
    required:
    - allowed
    - default
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.WorkersConfig:
    properties:
      autoscaling:
        type: boolean
      count:
        type: integer
      instance_type:
        type: string
      machine_type:
        description: IKS-specific fields
        type: string
      max_replicas:
        type: integer
      min_replicas:
        minimum: 0
        type: integer
      private_vlan:
        type: string
      public_vlan:
        type: string
      replicas:
        minimum: 0
        type: integer
    type: object
  github_com_tsanders-rh_ocpctl_pkg_types.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  github_com_tsanders-rh_ocpctl_pkg_types.Cluster:
    properties:
      api_url:
        description: Cluster outputs (joined from cluster_outputs table)
        type: string
      base_domain:
        type: string
      cluster_type:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.ClusterType'
      console_url:
        type: string
      cost_center:
        type: string
      created_at:
        type: string
      destroy_at:
        type: string
      destroyed_at:
        type: string
      effective_tags:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.Tags'
      id:
        type: string
      last_work_hours_check:
        type: string
      name:
        type: string
      offhours_opt_in:
        type: boolean
      owner:
        description: Email for display/metadata
        type: string
      owner_id:
        description: Foreign key to users table
        type: string
      platform:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.Platform'
      post_deploy_completed_at:
        type: string
      post_deploy_status:
        type: string
      profile:
        type: string
      region:
        type: string
      request_tags:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.Tags'
      requested_by:
        description: IAM principal ARN
        type: string
      skip_post_deployment:
        type: boolean
      ssh_public_key:
        type: string
      status:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.ClusterStatus'
      storage_config:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.StorageConfig'
      team:
        type: string
      ttl_hours:
        type: integer
      updated_at:
        type: string
      version:
        type: string
      work_days:
        type: integer
      work_hours_enabled:
        description: NULL = use user default
        type: boolean
      work_hours_end:
        type: string
      work_hours_start:
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_pkg_types.ClusterStatus:
    enum:
    - PENDING
    - CREATING
    - READY
    - HIBERNATING
    - HIBERNATED
    - RESUMING
    - DESTROYING
    - DESTROY_VERIFYING
    - DESTROY_FAILED
    - DESTROYED
    - FAILED
    type: string
    x-enum-comments:
      ClusterStatusDestroyFailed: Destroy attempted but resources remain
      ClusterStatusDestroyVerifying: Verifying all resources deleted
    x-enum-descriptions:
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - Verifying all resources deleted
    - Destroy attempted but resources remain
    - ""
    - ""
    x-enum-varnames:
    - ClusterStatusPending
    - ClusterStatusCreating
    - ClusterStatusReady
    - ClusterStatusHibernating
    - ClusterStatusHibernated
    - ClusterStatusResuming
    - ClusterStatusDestroying
    - ClusterStatusDestroyVerifying
    - ClusterStatusDestroyFailed
    - ClusterStatusDestroyed
    - ClusterStatusFailed
  github_com_tsanders-rh_ocpctl_pkg_types.ClusterStorageLinkRole:
    enum:
    - source
    - target
    - shared
    type: string
    x-enum-varnames:
    - ClusterStorageLinkRoleSource
    - ClusterStorageLinkRoleTarget
    - ClusterStorageLinkRoleShared
  github_com_tsanders-rh_ocpctl_pkg_types.ClusterType:
    enum:
    - openshift
    - eks
    - iks
    type: string
    x-enum-comments:
      ClusterTypeEKS: AWS Elastic Kubernetes Service
      ClusterTypeIKS: IBM Cloud Kubernetes Service
      ClusterTypeOpenShift: OpenShift (OCP/ROSA)
    x-enum-descriptions:
    - OpenShift (OCP/ROSA)
    - AWS Elastic Kubernetes Service
    - IBM Cloud Kubernetes Service
    x-enum-varnames:
    - ClusterTypeOpenShift
    - ClusterTypeEKS
    - ClusterTypeIKS
  github_com_tsanders-rh_ocpctl_pkg_types.CreateUserRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
      role:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.UserRole'
      username:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - email
    - password
    - role
    - username
    type: object
  github_com_tsanders-rh_ocpctl_pkg_types.Job:
    properties:
      attempt:
        type: integer
      cluster_id:
        type: string
      created_at:
        type: string
      ended_at:
        type: string
      error_code:
        type: string
      error_message:
        type: string
      id:
        type: string
      job_type:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.JobType'
      max_attempts:
        type: integer
      metadata:
