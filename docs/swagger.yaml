  /clusters/{id}/hibernate:
    post:
      consumes:
      - application/json
      description: Hibernates a cluster by stopping its instances. Reduces costs during
        off-hours. (AWS only)
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Cluster not ready or platform not supported
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - not cluster owner
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Cluster not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Hibernate cluster
      tags:
      - Clusters
  /clusters/{id}/kubeconfig:
    get:
      consumes:
      - application/json
      description: Downloads the kubeconfig file for a ready cluster as a YAML attachment
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/x-yaml
      responses:
        "200":
          description: Kubeconfig YAML file
          schema:
            type: file
        "400":
          description: Cluster not ready
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - not cluster owner
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Cluster or kubeconfig not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Download kubeconfig
      tags:
      - Clusters
  /clusters/{id}/kubeconfig/download-url:
    get:
      consumes:
      - application/json
      description: Returns a pre-signed S3 URL for downloading the kubeconfig (15-minute
        expiration)
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Contains download_url field
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Cluster not ready or S3 storage not configured
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - not cluster owner
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Cluster not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get kubeconfig download URL
      tags:
      - Clusters
  /clusters/{id}/logs:
    get:
      consumes:
      - application/json
      description: Returns deployment logs for a cluster with cursor-based pagination.
        Defaults to latest CREATE job if job_id not specified.
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      - description: Job ID to get logs for (defaults to latest CREATE job)
        in: query
        name: job_id
        type: string
      - description: Cursor for pagination
        in: query
        name: cursor
        type: string
      - description: Number of log lines to return (default 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - not cluster owner
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Cluster or logs not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get cluster deployment logs
      tags:
      - Clusters
  /clusters/{id}/outputs:
    get:
      consumes:
      - application/json
      description: Returns cluster outputs including kubeconfig, credentials, API
        URLs, and console URL. Only available for ready clusters.
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.ClusterOutputsResponse'
        "400":
          description: Cluster not ready or outputs not available
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - not cluster owner
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Cluster not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get cluster outputs
      tags:
      - Clusters
  /clusters/{id}/refresh-outputs:
    post:
      consumes:
      - application/json
      description: Extracts cluster outputs from the install directory and updates
        the database. Useful if outputs become stale.
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Cluster not ready
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - not cluster owner
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Cluster not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Refresh cluster outputs
      tags:
      - Clusters
  /clusters/{id}/resume:
    post:
      consumes:
      - application/json
      description: Resumes a hibernated cluster by starting its instances. (AWS only)
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Cluster not hibernating or platform not supported
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden - not cluster owner
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Cluster not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Resume cluster
      tags:
      - Clusters
  /clusters/{id}/storage:
    get:
      consumes:
      - application/json
      description: Returns all storage groups linked to this cluster
      parameters:
      - description: Cluster ID
        in: path
        name: id
        required: true
        type: string
