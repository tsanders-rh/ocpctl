      role:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.UserRole'
      username:
        maxLength: 100
        minLength: 2
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_pkg_types.UserResponse:
