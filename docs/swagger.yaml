basePath: /api/v1
definitions:
  github_com_tsanders-rh_ocpctl_internal_profile.AKSConfig:
    properties:
      kubernetes_version:
        type: string
      network_plugin:
        description: azure, kubenet
        type: string
      network_policy:
        description: azure, calico
        type: string
      node_pools:
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.AKSNodePoolConfig'
        type: array
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.AKSNodePoolConfig:
    properties:
      count:
        type: integer
      enable_auto_scale:
        type: boolean
      max_count:
        type: integer
      min_count:
        type: integer
      name:
        type: string
      os_disk_size_gb:
        type: integer
      vm_size:
        description: e.g., "Standard_D4s_v3"
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.AROConfig:
    properties:
      master_vm_size:
        description: e.g., "Standard_D8s_v3"
        type: string
      openshift_version:
        type: string
      pull_secret_path:
        type: string
      worker_count:
        type: integer
      worker_vm_size:
        description: e.g., "Standard_D4s_v3"
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.AWSConfig:
    properties:
      instanceMetadataService:
        type: string
      rootVolume:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.AWSRootVolume'
      subnets:
        items:
          type: string
        type: array
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.AWSRootVolume:
    properties:
      iops:
        type: integer
      size:
        type: integer
      type:
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.AzureConfig:
    properties:
      base_domain_resource_group:
        type: string
      compute:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.AzureMachineConfig'
      control_plane:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.AzureMachineConfig'
      network:
        type: string
      resource_group_prefix:
        type: string
      subnetwork:
        type: string
      subscription_id:
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.AzureMachineConfig:
    properties:
      os_disk_size_gb:
        type: integer
      os_disk_type:
        description: StandardSSD_LRS, Premium_LRS
        type: string
      vm_size:
        description: e.g., "Standard_D8s_v3"
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.BaseDomainConfig:
    properties:
      allowed:
        items:
          type: string
        minItems: 1
        type: array
      default:
        type: string
    required:
    - allowed
    - default
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.ClusterNetworkConfig:
    properties:
      cidr:
        type: string
      hostPrefix:
        type: integer
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.ComputeConfig:
    properties:
      control_plane:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.ControlPlaneConfig'
      managed_node_groups:
        description: For EKS (managed)
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.NodeGroupConfig'
        type: array
      node_groups:
        description: For EKS (unmanaged)
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.NodeGroupConfig'
        type: array
      workers:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.WorkersConfig'
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.ControlPlaneConfig:
    properties:
      instance_type:
        type: string
      replicas:
        minimum: 1
        type: integer
      schedulable:
        type: boolean
    required:
    - instance_type
    - replicas
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.CostControlsConfig:
    properties:
      budget_alert_threshold:
        maximum: 1
        minimum: 0
        type: number
      estimated_hourly_cost:
        type: number
      max_monthly_cost:
        type: number
      warning_message:
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.CustomResourceConfig:
    properties:
      api_version:
        type: string
      kind:
        type: string
      name:
        type: string
      namespace:
        type: string
      spec:
        additionalProperties: true
        type: object
    required:
    - api_version
    - kind
    - name
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.EKSConfig:
    properties:
      enabled_cluster_log_types:
        items:
          type: string
        type: array
      private_access:
        type: boolean
      public_access:
        type: boolean
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.FeaturesConfig:
    properties:
      fips_mode:
        type: boolean
      off_hours_scaling:
        type: boolean
      oidc_provider:
        description: EKS-specific
        type: boolean
      private_cluster:
        type: boolean
      private_service_endpoint:
        type: boolean
      public_service_endpoint:
        description: IKS-specific
        type: boolean
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.GCPConfig:
    properties:
      compute:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.GCPMachineConfig'
      control_plane:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.GCPMachineConfig'
      network:
        type: string
      project:
        type: string
      secure_boot_policy:
        type: string
      service_account:
        type: string
      subnetwork:
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.GCPMachineConfig:
    properties:
      disk_size_gb:
        type: integer
      disk_type:
        type: string
      machine_type:
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.GKEConfig:
    properties:
      enable_workload_identity:
        type: boolean
      enabled_cluster_log_types:
        items:
          type: string
        type: array
      node_pools:
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.GKENodePoolConfig'
        type: array
      private_access:
        type: boolean
      public_access:
        type: boolean
      release_channel:
        description: '"rapid", "regular", "stable"'
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.GKENodePoolConfig:
    properties:
      disk_size_gb:
        type: integer
      disk_type:
        type: string
      enable_auto_scale:
        type: boolean
      machine_type:
        type: string
      max_node_count:
        type: integer
      min_node_count:
        type: integer
      name:
        type: string
      node_count:
        type: integer
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.HelmChartConfig:
    properties:
      chart:
        type: string
      name:
        type: string
      repo:
        type: string
      values:
        additionalProperties: true
        type: object
    required:
    - chart
    - name
    - repo
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.IBMCloudConfig:
    properties:
      classicInfrastructure:
        type: boolean
      dataCenter:
        type: string
      resourceGroup:
        type: string
      vpcname:
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.LifecycleConfig:
    properties:
      allow_custom_ttl:
        type: boolean
      default_ttl_hours:
        minimum: 1
        type: integer
      max_ttl_hours:
        minimum: 1
        type: integer
      warn_before_destroy_hours:
        minimum: 0
        type: integer
    required:
    - default_ttl_hours
    - max_ttl_hours
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.MachineNetworkConfig:
    properties:
      cidr:
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.ManifestConfig:
    properties:
      description:
        type: string
      name:
        type: string
      namespace:
        description: Target namespace for the manifest
        type: string
      path:
        description: Local file path
        type: string
      url:
        description: Remote URL (e.g. GitHub raw URL)
        type: string
    required:
    - name
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.MetadataConfig:
    properties:
      capabilities:
        items:
          type: string
        type: array
      capacity:
        additionalProperties: true
        type: object
      notes:
        items:
          type: string
        type: array
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.NetworkingConfig:
    properties:
      clusterNetworks:
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.ClusterNetworkConfig'
        type: array
      machineNetwork:
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.MachineNetworkConfig'
        type: array
      nat_gateway:
        description: '"Single" or "HighlyAvailable"'
        type: string
      networkType:
        type: string
      serviceNetwork:
        items:
          type: string
        type: array
      vpc_cidr:
        description: EKS-specific fields
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.NodeGroupConfig:
    properties:
      ami_family:
        description: For managed node groups (AmazonLinux2023, AmazonLinux2, etc.)
        type: string
      desired_capacity:
        minimum: 1
        type: integer
      instance_type:
        type: string
      max_size:
        type: integer
      min_size:
        minimum: 0
        type: integer
      name:
        type: string
      volume_size:
        type: integer
      volume_type:
        type: string
    required:
    - desired_capacity
    - instance_type
    - max_size
    - min_size
    - name
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.OperatorConfig:
    properties:
      channel:
        type: string
      custom_resource:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.CustomResourceConfig'
      name:
        type: string
      namespace:
        type: string
      source:
        description: e.g. "redhat-operators" (optional - OLM will search all catalogs
          if omitted)
        type: string
    required:
    - channel
    - name
    - namespace
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.PlatformConfig:
    properties:
      aks:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.AKSConfig'
      aro:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.AROConfig'
      aws:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.AWSConfig'
      azure:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.AzureConfig'
      eks:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.EKSConfig'
      gcp:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.GCPConfig'
      gke:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.GKEConfig'
      ibmcloud:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.IBMCloudConfig'
      rosa:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.ROSAConfig'
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.PostDeploymentConfig:
    properties:
      enabled:
        type: boolean
      helm_charts:
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.HelmChartConfig'
        type: array
      manifests:
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.ManifestConfig'
        type: array
      operators:
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.OperatorConfig'
        type: array
      scripts:
        items:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.ScriptConfig'
        type: array
      timeout:
        description: Duration string, e.g. "30m"
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.Profile:
    properties:
      baseDomains:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.BaseDomainConfig'
      clusterType:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.ClusterType'
      compute:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.ComputeConfig'
      costControls:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.CostControlsConfig'
      credentialsMode:
        description: Default credentials mode (Mint, Passthrough, Manual, Static)
        type: string
      description:
        type: string
      displayName:
        type: string
      enabled:
        type: boolean
      features:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.FeaturesConfig'
      kubernetesVersions:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.VersionConfig'
      lifecycle:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.LifecycleConfig'
      metadata:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.MetadataConfig'
      name:
        type: string
      networking:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.NetworkingConfig'
      openshiftVersions:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.VersionConfig'
      platform:
        allOf:
        - $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.Platform'
        enum:
        - aws
        - ibmcloud
        - gcp
        - azure
      platformConfig:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.PlatformConfig'
      postDeployment:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.PostDeploymentConfig'
      regions:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.RegionConfig'
      tags:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.TagsConfig'
      track:
        description: ga, prerelease, or kube
        enum:
        - ga
        - prerelease
        - kube
        type: string
      zones:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_internal_profile.ZoneConfig'
    required:
    - compute
    - description
    - displayName
    - lifecycle
    - name
    - platform
    - regions
    - tags
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.ProfileVersionStatus:
    properties:
      available_versions:
        items:
          type: string
        type: array
      current_versions:
        items:
          type: string
        type: array
      default_version:
        type: string
      last_checked:
        type: string
      new_versions:
        description: Versions not in current list
        items:
          type: string
        type: array
      profile_name:
        type: string
      update_count:
        type: integer
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.ROSAConfig:
    properties:
      compute_nodes:
        description: Number of compute nodes
        type: integer
      machine_type:
        description: Compute instance type
        type: string
      multi_az:
        description: Multi-AZ deployment
        type: boolean
      sts_enabled:
        description: STS authentication (required for ROSA)
        type: boolean
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.RegionConfig:
    properties:
      allowed:
        items:
          type: string
        minItems: 1
        type: array
      default:
        type: string
    required:
    - allowed
    - default
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.ScriptConfig:
    properties:
      description:
        type: string
      env:
        additionalProperties:
          type: string
        description: Additional environment variables
        type: object
      name:
        type: string
      path:
        type: string
    required:
    - name
    - path
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.TagsConfig:
    properties:
      allow_user_tags:
        type: boolean
      defaults:
        additionalProperties:
          type: string
        type: object
      required:
        additionalProperties:
          type: string
        type: object
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.VersionConfig:
    properties:
      allowed:
        items:
          type: string
        minItems: 1
        type: array
      default:
        type: string
    required:
    - allowed
    - default
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.WorkersConfig:
    properties:
      autoscaling:
        type: boolean
      count:
        type: integer
      instance_type:
        type: string
      machine_type:
        description: IKS-specific fields
        type: string
      max_replicas:
        type: integer
      min_replicas:
        minimum: 0
        type: integer
      private_vlan:
        type: string
      public_vlan:
        type: string
      replicas:
        minimum: 0
        type: integer
    type: object
  github_com_tsanders-rh_ocpctl_internal_profile.ZoneConfig:
    properties:
      allowed:
        items:
          type: string
        minItems: 1
        type: array
      default:
        type: string
    required:
    - allowed
    - default
    type: object
  github_com_tsanders-rh_ocpctl_pkg_types.APIKeyResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      is_expired:
        type: boolean
      key_prefix:
        type: string
      last_used_at:
        type: string
      name:
        type: string
      revoked_at:
        type: string
      scope:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.APIKeyScope'
    type: object
  github_com_tsanders-rh_ocpctl_pkg_types.APIKeyScope:
    enum:
    - read_only
    - full_access
    type: string
    x-enum-varnames:
    - APIKeyScopeReadOnly
    - APIKeyScopeFullAccess
  github_com_tsanders-rh_ocpctl_pkg_types.AddUserToTeamRequest:
    properties:
      notes:
        type: string
      user_id:
        type: string
    required:
    - user_id
    type: object
  github_com_tsanders-rh_ocpctl_pkg_types.AddonSelection:
    properties:
      id:
        example: oadp
        type: string
      version:
        example: stable
        type: string
    required:
    - id
    - version
    type: object
  github_com_tsanders-rh_ocpctl_pkg_types.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  github_com_tsanders-rh_ocpctl_pkg_types.Cluster:
    properties:
      api_url:
        description: Cluster outputs (joined from cluster_outputs table)
        type: string
      base_domain:
        type: string
      cluster_type:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.ClusterType'
      console_url:
        type: string
      cost_center:
        type: string
      created_at:
        type: string
      credentials_mode:
        type: string
      custom_post_config:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.CustomPostConfig'
      custom_pull_secret:
        description: Optional custom pull secret JSON to merge
        type: string
      destroy_at:
        type: string
      destroyed_at:
        type: string
      effective_tags:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.Tags'
      id:
        type: string
      last_cleaned_at:
        type: string
      last_work_hours_check:
        type: string
      lease_expires_at:
        type: string
      lease_metadata:
        additionalProperties: true
        type: object
      leased_at:
        type: string
      leased_by:
        type: string
      name:
        type: string
      offhours_opt_in:
        type: boolean
      owner:
        description: Email for display/metadata
        type: string
      owner_id:
        description: Foreign key to users table
        type: string
      platform:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.Platform'
      pool_generation:
        type: integer
      pool_id:
        description: Cluster pool tracking
        type: string
      pool_state:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.PoolState'
      post_deploy_completed_at:
        type: string
      post_deploy_status:
        type: string
      preserve_on_failure:
        type: boolean
      profile:
        type: string
      region:
        type: string
      request_tags:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.Tags'
      requested_by:
        description: IAM principal ARN
        type: string
      skip_post_deployment:
        type: boolean
      ssh_public_key:
        type: string
      status:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.ClusterStatus'
      storage_config:
        $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.StorageConfig'
      team:
        type: string
      ttl_hours:
        type: integer
      updated_at:
        type: string
      version:
        type: string
      work_days:
        type: integer
      work_hours_enabled:
        description: NULL = use user default
        type: boolean
      work_hours_end:
        type: string
      work_hours_start:
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_pkg_types.ClusterPool:
    properties:
      auto_refresh_enabled:
        type: boolean
      auto_release_enabled:
        type: boolean
      cluster_config:
        additionalProperties: true
        description: Configuration overrides (stored as JSONB in database)
        type: object
      created_at:
        type: string
      created_by:
        type: string
      description:
        type: string
      display_name:
        type: string
      enabled:
        description: Metadata
        type: boolean
      id:
        type: string
      max_cluster_age_days:
        description: Cluster lifecycle
        type: integer
      max_lease_duration_hours:
        description: Lease configuration
        type: integer
      max_size:
        type: integer
      min_size:
        type: integer
      name:
        type: string
      profile:
        type: string
      schedule_days_of_week:
        items:
          type: integer
        type: array
      schedule_end_hour:
        type: integer
      schedule_start_hour:
        type: integer
      schedule_timezone:
        type: string
      scheduled_mode:
        description: Scheduling (work hours mode)
        type: boolean
      target_size:
        description: Pool sizing
        type: integer
      updated_at:
        type: string
    type: object
  github_com_tsanders-rh_ocpctl_pkg_types.ClusterPoolStats:
    properties:
      active_leases:
        description: Lease metrics
        type: integer
      avg_cluster_age:
        $ref: '#/definitions/time.Duration'
      avg_lease_duration:
        $ref: '#/definitions/time.Duration'
      capacity_percent:
