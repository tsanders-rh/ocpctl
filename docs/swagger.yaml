  /health:
    get:
      description: Returns basic health status of the API server
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - system
  /jobs:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of jobs. Can be filtered by cluster_id,
        type (create/destroy), and status.
      parameters:
      - description: Filter by cluster ID
        in: query
        name: cluster_id
        type: string
      - description: Filter by job type (create, destroy)
        in: query
        name: type
        type: string
      - description: Filter by status (pending, running, completed, failed)
        in: query
        name: status
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 50, max 100)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List jobs
      tags:
      - Jobs
  /jobs/{id}:
    get:
      consumes:
      - application/json
      description: Retrieves details of a specific job by ID
      parameters:
      - description: Job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.Job'
        "404":
          description: Job not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get job
      tags:
      - Jobs
  /profiles:
    get:
      consumes:
      - application/json
      description: Returns all available cluster profiles. Can be filtered by platform
        (aws or ibmcloud).
      parameters:
      - description: Filter by platform (aws, ibmcloud)
        in: query
        name: platform
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api.ProfileResponse'
            type: array
        "400":
          description: Invalid platform parameter
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List cluster profiles
      tags:
      - Profiles
  /profiles/{name}:
    get:
      consumes:
      - application/json
      description: Returns details of a specific cluster profile by name
      parameters:
      - description: Profile name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.ProfileResponse'
        "404":
          description: Profile not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get cluster profile
      tags:
      - Profiles
  /ready:
    get:
      description: Checks if the server is ready to handle requests by verifying database
        connectivity
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Readiness check
      tags:
      - system
  /users:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of users (admin only). Password hashes
        are excluded from response. Supports pagination via query parameters.
      parameters:
      - description: 'Maximum number of users to return (default: 50, max: 100)'
        in: query
        name: limit
        type: integer
      - description: 'Number of users to skip (default: 0)'
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Returns users array, total count, limit, and offset
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid pagination parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to list users
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - Users
    post:
      consumes:
      - application/json
      description: Creates a new user with specified email, username, role, and password
        (admin only)
      parameters:
      - description: User creation request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.UserResponse'
        "400":
          description: Invalid request or validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Email already exists
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to create user
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create user
      tags:
      - Users
  /users/{id}:
    delete:
      consumes:
      - application/json
      description: Soft deletes a user by marking as inactive (admin only). Also revokes
        all refresh tokens.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: User ID required or cannot delete self
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to delete user
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - Users
    get:
      consumes:
      - application/json
      description: Retrieves user details by ID (admin only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.UserResponse'
        "400":
          description: User ID required
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to get user
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get user
      tags:
      - Users
    patch:
      consumes:
      - application/json
      description: Updates user details including username, role, timezone, work hours,
        or active status (admin only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: User update fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.UserResponse'
        "400":
          description: Invalid request or validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to update user
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update user
      tags:
      - Users
  /version:
    get:
      description: Returns version, commit hash, and build time of the API server
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Version information
      tags:
      - system
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 'JWT access token. Format: "Bearer {token}". Obtain from /api/v1/auth/login
      endpoint.'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
