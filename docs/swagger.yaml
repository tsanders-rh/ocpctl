host: ocpctl.mg.dog8code.com
info:
  contact:
    name: OCPCTL Support
    url: http://github.com/tsanders-rh/ocpctl/issues
  description: OCPCTL is a self-service OpenShift cluster provisioning and management
    platform. This API provides endpoints for creating, managing, and destroying OpenShift
    clusters with automated lifecycle management, policy enforcement, and resource
    tracking.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://github.com/tsanders-rh/ocpctl
  title: OCPCTL API
  version: "1.0"
paths:
  /admin/clusters/long-running:
    get:
      description: Returns READY clusters running 24+ hours without hibernation (admin
        only)
      parameters:
      - description: 'Minimum running hours (default: 24)'
        in: query
        name: min_hours
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get long-running clusters
      tags:
      - admin
  /admin/clusters/statistics:
    get:
      description: Returns aggregated statistics for all clusters (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.ClusterStatistics'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get cluster statistics
      tags:
      - admin
  /admin/orphaned-resources:
    get:
      consumes:
      - application/json
      description: Lists orphaned AWS resources that were detected by the janitor.
        Supports filtering by status, type, and region.
      parameters:
      - description: Filter by status (active, resolved, ignored)
        in: query
        name: status
        type: string
      - description: Filter by resource type (VPC, LoadBalancer, HostedZone, DNSRecord,
          EC2Instance, S3Bucket)
        in: query
        name: type
        type: string
      - description: Filter by AWS region
        in: query
        name: region
        type: string
      - description: Maximum number of results (default 50, max 100)
        in: query
        name: limit
        type: integer
      - description: Number of results to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.OrphanedResourceListResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List orphaned resources
      tags:
      - Orphaned Resources
  /admin/orphaned-resources/{id}:
    delete:
      consumes:
      - application/json
      description: Actually deletes the orphaned resource from AWS (currently supports
        HostedZone and DNSRecord only). Other resource types must be deleted manually
        in AWS Console.
      parameters:
      - description: Resource ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.OrphanedResource'
        "400":
          description: Resource type not supported for automated deletion
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Resource not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to delete resource from AWS
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete orphaned AWS resource
      tags:
      - Orphaned Resources
  /admin/orphaned-resources/{id}/ignore:
    patch:
      consumes:
      - application/json
      description: Marks an orphaned resource as ignored (e.g., false positive or
        intentionally kept)
      parameters:
      - description: Resource ID
        in: path
        name: id
        required: true
        type: string
      - description: Ignore reason
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.MarkIgnoredRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.OrphanedResource'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Mark orphaned resource as ignored
      tags:
      - Orphaned Resources
  /admin/orphaned-resources/{id}/resolve:
    patch:
      consumes:
      - application/json
      description: Marks an orphaned resource as resolved (e.g., after manual cleanup
        in AWS Console)
      parameters:
      - description: Resource ID
        in: path
        name: id
        required: true
        type: string
      - description: Resolution notes
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.MarkResolvedRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tsanders-rh_ocpctl_pkg_types.OrphanedResource'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Mark orphaned resource as resolved
      tags:
      - Orphaned Resources
  /admin/orphaned-resources/stats:
    get:
      consumes:
      - application/json
      description: Returns aggregated statistics about orphaned resources grouped
        by type and status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get orphaned resources statistics
      tags:
      - Orphaned Resources
  /admin/pools:
    get:
      consumes:
      - application/json
      description: Returns a list of all cluster pools. All authenticated users can
        list enabled pools via /pools. Admins can list all pools (including disabled)
        via /admin/pools.
      parameters:
      - description: 'Filter to only enabled pools (default: true for /pools, false
          for /admin/pools)'
        in: query
        name: enabled_only
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: Returns pools array
          schema:
            additionalProperties: true
