---
# Windows 10 Virtual Machine Example
# This VM template creates a basic Windows 10 VM for testing
#
# Prerequisites:
# - OpenShift Virtualization operator installed
# - Windows 10 ISO uploaded to a PVC
# - virtio-win drivers ISO uploaded
#
# Usage:
#   oc apply -f windows-10-vm.yaml
#   virtctl start windows-10-test

apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: windows-10-test
  namespace: default
  labels:
    app: windows-10
    os: windows
    workload: desktop
spec:
  running: false  # Set to true to auto-start
  template:
    metadata:
      labels:
        kubevirt.io/vm: windows-10-test
        os.type: windows
    spec:
      domain:
        cpu:
          cores: 4
          sockets: 1
          threads: 1
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: windows-iso
              cdrom:
                bus: sata
                readonly: true
            - name: virtio-drivers
              cdrom:
                bus: sata
                readonly: true
          interfaces:
            - name: default
              masquerade: {}
              model: virtio
          tpm: {}  # Required for Windows 11
        machine:
          type: q35
        resources:
          requests:
            memory: 8Gi
            cpu: "4"
          limits:
            memory: 8Gi
            cpu: "4"
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          persistentVolumeClaim:
            claimName: windows-10-disk
        - name: windows-iso
          persistentVolumeClaim:
            claimName: windows-10-iso
        - name: virtio-drivers
          persistentVolumeClaim:
            claimName: virtio-win-iso

---
# PVC for Windows 10 OS disk
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: windows-10-disk
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 60Gi  # Windows 10 needs ~40-50GB
  storageClassName: gp3  # AWS EBS gp3

---
# PVC for Windows 10 ISO (must be uploaded separately)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: windows-10-iso
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 6Gi
  storageClassName: gp3

---
# PVC for virtio-win drivers ISO
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: virtio-win-iso
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
  storageClassName: gp3
